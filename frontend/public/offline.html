<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f766e" />
    <title>رخداد | آفلاین</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Tahoma, Arial, sans-serif;
      }

      main {
        width: min(520px, calc(100% - 32px));
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        background: #ffffff;
        padding: 32px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
        line-height: 1.9;
      }

      a {
        color: #0f766e;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>اتصال اینترنت برقرار نیست</h1>
      <p>برای مشاهده رویدادهای تازه، اتصال را بررسی کنید و دوباره به رخداد برگردید.</p>
      <a href="/">بازگشت به صفحه اصلی</a>
    </main>
  </body>
</html>
