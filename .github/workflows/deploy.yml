name: Deploy to rokhdad.top

# Builds the frontend & backend images from the latest code and redeploys
# them on the server. Triggers on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build & deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            REPO=/opt/rokhdad/src
            DEPLOY=/opt/rokhdad/deploy

            # 1) Get the latest code on the server
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/m4tinbeigi-official/rokhdad.top.git "$REPO"
            fi
            cd "$REPO"
            git fetch --all --prune
            git reset --hard origin/main

            # 2) Rebuild the images with the exact tags the compose file expects
            docker build -t rokhdad/frontend:latest ./frontend
            docker build -t rokhdad/backend:latest ./backend

            # 3) Recreate the running containers with the new images.
            #    IMPORTANT: this stack is composed from TWO files — the base file
            #    plus the migration override (which defines the 127.0.0.1:3001->3000
            #    and backend port mappings). Both must be passed or the port
            #    mappings are dropped and nginx returns 502.
            cd "$DEPLOY"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.migration-override.yml"
            $COMPOSE up -d --no-deps --force-recreate frontend backend

            # 4) Clean up dangling images to save disk
            docker image prune -f
