name: Deploy to rokhdad.top

# Builds the frontend & backend images from the latest code and redeploys
# them on the server. Triggers on every push to main, or manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build & deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            REPO=/opt/rokhdad/src
            DEPLOY=/opt/rokhdad/deploy

            # 1) Get the latest code on the server
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/m4tinbeigi-official/rokhdad.top.git "$REPO"
            fi
            cd "$REPO"
            git fetch --all --prune
            git reset --hard origin/main

            # 2) Rebuild the frontend image (the elegant UI lives here).
            #    NOTE: backend is intentionally NOT auto-recreated. The deploy dir
            #    is currently missing its .env (MARIADB_*/MONGO_*/REDIS_* unset),
            #    so recreating backend risks bringing it up without DB credentials
            #    and returning 502. Deploy backend manually after the .env is
            #    confirmed (see DEPLOY.md).
            docker build -t rokhdad/frontend:latest ./frontend

            # 3) Recreate ONLY the frontend, passing BOTH compose files so the
            #    127.0.0.1:3001->3000 port mapping from the override is preserved
            #    (running with the base file alone drops it and nginx returns 502).
            cd "$DEPLOY"
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.migration-override.yml"
            $COMPOSE up -d --no-deps --force-recreate frontend

            # 4) Health check — fail the deploy (and surface it in Actions) if the
            #    site is not serving a normal status code.
            sleep 5
            CODE=$(curl -ksS -o /dev/null -w '%{http_code}' https://rokhdad.top || echo 000)
            echo "Homepage HTTP status: $CODE"
            case "$CODE" in
              200|301|302) echo "Site healthy." ;;
              *) echo "Site unhealthy (HTTP $CODE) after deploy"; exit 1 ;;
            esac

            # 5) Clean up dangling images to save disk
            docker image prune -f
